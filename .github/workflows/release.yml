name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-release:
    name: Build & Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: code-context
            asset_name: code-context-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: code-context
            asset_name: code-context-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: code-context
            asset_name: code-context-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: code-context
            asset_name: code-context-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: code-context.exe
            asset_name: code-context-windows-amd64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary for release
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv ${{ matrix.artifact_name }} ../../../${{ matrix.asset_name }}
          else
            mv ${{ matrix.artifact_name }} ../../../${{ matrix.asset_name }}
          fi

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          subject-path: ${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
