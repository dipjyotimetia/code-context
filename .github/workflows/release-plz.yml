name: Release Plz

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  DIST_VERSION: 0.28.0

jobs:
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Publish crate and GitHub release
    runs-on: ubuntu-latest
    needs: release-pr
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      release_tag: ${{ steps.release.outputs.releases_created == 'true' && fromJSON(steps.release.outputs.releases)[0].tag || '' }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-local-artifacts:
    name: Build local artifacts (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-dist (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v${{ env.DIST_VERSION }}/cargo-dist-installer.sh | sh

      - name: Install cargo-dist (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: irm https://github.com/axodotdev/cargo-dist/releases/download/v${env:DIST_VERSION}/dist-installer.ps1 | iex

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: dist-${{ matrix.target }}

      - name: Build local artifacts
        run: dist build --artifacts=local --target=${{ matrix.target }} --tag=${{ needs.release.outputs.release_tag }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Upload local artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.target }}
          path: target/distrib/*
          if-no-files-found: error

  build-global-artifacts:
    name: Build global artifacts
    runs-on: ubuntu-24.04
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-dist
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v${{ env.DIST_VERSION }}/cargo-dist-installer.sh | sh

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: dist-global

      - name: Build global artifacts
        run: dist build --artifacts=global --tag=${{ needs.release.outputs.release_tag }}

      - name: Upload global artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-global
          path: target/distrib/*
          if-no-files-found: error

  publish-artifacts:
    name: Publish artifacts
    runs-on: ubuntu-24.04
    needs: [release, build-local-artifacts, build-global-artifacts]
    if: needs.release.outputs.releases_created == 'true'
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist-artifacts/**/*

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.release_tag }}
          files: dist-artifacts/**/*